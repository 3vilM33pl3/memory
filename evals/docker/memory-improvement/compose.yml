services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 2s
      timeout: 2s
      retries: 30
  service:
    build:
      context: ../../..
      dockerfile: evals/docker/app-build-sequence/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CODEX_HOME: /codex-home
      MEMORY_LAYER_PROFILE: prod
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    volumes:
      - ../../..:/workspace
      - ${CODEX_HOME:-$HOME/.codex}:/codex-home-host:ro
    command: ["/usr/local/bin/memory", "--config", "/workspace/evals/docker/memory-improvement/config.service.toml", "service", "run"]
  eval:
    build:
      context: ../../..
      dockerfile: evals/docker/app-build-sequence/Dockerfile
    depends_on:
      service:
        condition: service_started
    environment:
      CODEX_HOME: /codex-home
      MEMORY_LAYER_PROFILE: prod
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      MEMORY_EVAL_REPEAT: ${MEMORY_EVAL_REPEAT:-5}
      MEMORY_EVAL_LLM_JUDGE: ${MEMORY_EVAL_LLM_JUDGE:-0}
      MEMORY_EVAL_CONDITIONS: ${MEMORY_EVAL_CONDITIONS:-no-memory lexical semantic graph full-memory}
    volumes:
      - ../../..:/workspace
      - ${CODEX_HOME:-$HOME/.codex}:/codex-home-host:ro
    command: ["sh", "/workspace/evals/docker/memory-improvement/run-eval.sh"]
