components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      description: |
        The service API token from the machine configuration
        ([service].api_token). Loopback requests from the bundled web UI use a
        trusted-origin path instead. Read-only GETs from loopback may be
        accepted without a token depending on configuration.
  schemas:
    QueryRequest:
      type: object
      required: [project, query]
      properties:
        project: { type: string, description: Project slug to query. }
        query: { type: string, description: Natural-language question. }
        top_k: { type: integer, default: 8, description: Maximum memories retrieved before answer synthesis. }
        min_confidence: { type: [number, "null"], description: Ignore memories below this confidence. }
        include_stale: { type: boolean, default: false, description: Bypass provenance-based stale-source de-ranking. }
        history: { type: boolean, default: false, description: Search all versions including tombstones. }
        filters:
          type: object
          description: Optional type/tag filters.
          properties:
            types: { type: array, items: { type: string } }
            tags: { type: array, items: { type: string } }
          additionalProperties: true
        retrieval_mode:
          type: [string, "null"]
          description: Eval/debug channel isolation; omit for normal queries.
        answer_mode:
          type: [string, "null"]
          enum: [auto, llm, deterministic, null]
          description: auto (default) uses the configured LLM when available; deterministic forces the eval-gated template synthesizer.
    GlobalQueryRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        top_k: { type: integer, default: 8 }
      additionalProperties: true
    QueryResponse:
      type: object
      required: [answer, confidence, results, insufficient_evidence]
      properties:
        answer: { type: string, description: Synthesized answer, or a refusal sentence when evidence is insufficient. }
        confidence: { type: number, description: 0-1 answer confidence. }
        insufficient_evidence: { type: boolean, description: True when the engine refused rather than guessed. }
        results:
          type: array
          items: { $ref: '#/components/schemas/QueryResult' }
        answer_citations:
          type: array
          description: The memories the answer draws from, by result number.
          items:
            type: object
            properties:
              result_number: { type: integer }
              memory_id: { type: string, format: uuid }
              summary: { type: string }
              snippet: { type: string }
            additionalProperties: true
        answer_generation:
          type: object
          description: How the answer was produced (method, cited results, token usage, fallback reason).
          additionalProperties: true
        diagnostics:
          type: object
          description: Per-channel retrieval timings and counts.
          additionalProperties: true
    QueryResult:
      type: object
      required: [memory_id, summary, memory_type, score, snippet]
      properties:
        memory_id: { type: string, format: uuid }
        project: { type: [string, "null"] }
        summary: { type: string }
        memory_type: { type: string, description: One of the 17 canonical memory types. }
        score: { type: number, description: Final ranking score. }
        snippet: { type: string }
        match_kind: { type: string, description: lexical | semantic | hybrid. }
        score_explanation: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        needs_review: { type: boolean, description: Flagged by validation for human review; ranked with a penalty. }
        sources: { type: array, items: { type: object, additionalProperties: true } }
        graph_connections: { type: array, items: { type: object, additionalProperties: true } }
        debug:
          type: object
          description: Ranking components (term_overlap, semantic_similarity, memory_confidence, boosts).
          additionalProperties: true
    CaptureTaskRequest:
      type: object
      required: [project, task_title, user_prompt, writer_id, agent_summary]
      properties:
        project: { type: string }
        task_title: { type: string }
        user_prompt: { type: string, description: The original request or task framing. }
        writer_id: { type: string, description: Stable writer identity; auto-derived by the CLI when empty. }
        writer_name: { type: [string, "null"] }
        agent_summary: { type: string, description: What was done, in one or two sentences. }
        files_changed: { type: array, items: { type: string } }
        git_diff_summary: { type: [string, "null"] }
        tests: { type: array, items: { type: object, additionalProperties: true } }
        notes: { type: array, items: { type: string }, description: Durable facts to preserve as evidence. }
        structured_candidates:
          type: array
          description: Pre-distilled memory candidates; curation still gates them.
          items: { $ref: '#/components/schemas/CaptureCandidateInput' }
        command_output: { type: [string, "null"] }
        idempotency_key: { type: [string, "null"] }
        dry_run: { type: boolean, default: false }
    CaptureCandidateInput:
      type: object
      required: [canonical_text, summary, memory_type]
      properties:
        canonical_text: { type: string, description: The durable claim, self-contained. }
        summary: { type: string }
        memory_type: { type: string }
        confidence: { type: number, default: 0.7 }
        importance: { type: integer, default: 3 }
        tags: { type: array, items: { type: string } }
        sources:
          type: array
          items:
            type: object
            properties:
              source_kind: { type: string, description: file | commit | note | memory | symbol. }
              file_path: { type: [string, "null"] }
              git_commit: { type: [string, "null"] }
              excerpt: { type: [string, "null"] }
            additionalProperties: true
    CaptureTaskResponse:
      type: object
      properties:
        project_id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        task_id: { type: string, format: uuid }
        raw_capture_id: { type: string, format: uuid }
        idempotency_key: { type: [string, "null"] }
        dry_run: { type: boolean }
      additionalProperties: true
    CurateRequest:
      type: object
      required: [project]
      properties:
        project: { type: string }
        batch_size: { type: [integer, "null"], description: Limit raw captures processed in one run. }
        raw_capture_id: { type: [string, "null"], format: uuid, description: Curate one specific capture. }
        replacement_policy: { type: [string, "null"], enum: [conservative, balanced, aggressive, null] }
        dry_run: { type: boolean, default: false }
    CurateResponse:
      type: object
      properties:
        project_id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        input_count: { type: integer }
        output_count: { type: integer }
        memory_ids: { type: array, items: { type: string, format: uuid } }
        proposal_count: { type: integer }
        replaced_count: { type: integer }
        replacements: { type: array, items: { type: object, additionalProperties: true } }
        dry_run: { type: boolean }
      additionalProperties: true
    ProjectMemoryGraphResponse:
      type: object
      properties:
        project: { type: string }
        total_memories: { type: integer }
        returned_memories: { type: integer }
        nodes:
          type: array
          items:
            type: object
            properties:
