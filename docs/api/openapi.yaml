# Memory Layer HTTP API v1 — OpenAPI 3.1 specification.
#
# Source of truth for the public API surface, served by the service at
# GET /v1/openapi.yaml. A contract test in mem-service keeps this file's
# path inventory in sync with the axum router (routes.rs) in both
# directions.
#
# Stability contract: operations marked x-stability: core are frozen —
# existing fields never change meaning, additive fields may appear, and
# clients must ignore unknown fields. Operations marked x-stability:
# internal form the service control plane (loops, watchers, agents,
# admin) and may change between minor versions.
openapi: 3.1.0
info:
  title: Memory Layer API
  version: "1.0"
  description: |
    Local-first project memory for coding agents: capture completed work,
    curate it into durable memories, and query it back with cited answers
    or honest refusals. The service listens on localhost only by default;
    nothing leaves your machine.
servers:
  - url: http://127.0.0.1:4040
    description: Local service (native install default)
  - url: http://localhost:4040
    description: Bundled Docker Compose stack
security:
  - bearerToken: []
paths:
  /v1/openapi.yaml:
    get:
      operationId: get_v1_openapi_yaml
      summary: "This specification, served by the running service."
      tags: ["System"]
      x-stability: core
      security: []
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema: { type: string }
