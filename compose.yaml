# Bundled Memory Layer stack: PostgreSQL + pgvector, the service, and the web UI.
#
#   docker compose up
#
# then open http://localhost:4040 and run `memory demo` to load a showcase
# project. Keyless by default (lexical retrieval needs no API keys); add an
# OPENAI_API_KEY and flip the [features]/[embeddings] flags to enable LLM
# curation and semantic search.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 3s
      timeout: 5s
      retries: 20

  memory:
    image: memory-layer:local
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MEMORY_LAYER__DATABASE__URL: postgresql://memory:memory@postgres:5432/memory
      MEMORY_LAYER__SERVICE__BIND_ADDR: 0.0.0.0:4040
      MEMORY_LAYER__SERVICE__API_TOKEN: memory-local-token
    ports:
      - "4040:4040"

volumes:
  pgdata:
