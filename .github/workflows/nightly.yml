name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Nightly Quality Sweep
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Rust validation
        run: |
          cargo fmt --check
          cargo test --workspace --all-targets --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Web validation
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Offline evaluation smoke
        run: |
          cp memory-layer.toml.example "$RUNNER_TEMP/memory-layer.toml"
          cargo run --locked --bin memory -- \
            --config "$RUNNER_TEMP/memory-layer.toml" \
            eval run \
            --suite evals/examples/memory-smoke \
            --condition full-memory \
            --profile offline \
            --dry-run
        env:
          MEMORY_LAYER_PROFILE: prod

      - name: Dependency audit reports
        continue-on-error: true
        run: |
          npm --prefix web audit --audit-level=high
          cargo install cargo-audit --locked
          cargo audit

  debian-package-smoke:
    name: Debian Package Smoke (${{ matrix.deb_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            deb_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            deb_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Debian package smoke
        run: ./packaging/build-deb.sh --arch "${{ matrix.deb_arch }}" --target "${{ matrix.rust_target }}"
