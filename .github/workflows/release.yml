name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate release versions
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          web_version="$(node -p "require('./web/package.json').version")"
          lock_web_version="$(node -p "require('./web/package-lock.json').version")"
          docs_site_version="$(node -p "require('./docs-site/package.json').version")"
          lock_docs_site_version="$(node -p "require('./docs-site/package-lock.json').version")"
          lock_mem_cli_version="$(awk '
            $0 == "name = \"mem-cli\"" { found = 1; next }
            found && /^version = / { gsub(/"/, "", $3); print $3; exit }
          ' Cargo.lock)"

          test "$cargo_version" = "$version"
          test "$web_version" = "$version"
          test "$lock_web_version" = "$version"
          test "$docs_site_version" = "$version"
          test "$lock_docs_site_version" = "$version"
          test "$lock_mem_cli_version" = "$version"

      - name: Run release validation
        run: |
          cargo fmt --check
          cargo test --workspace --all-targets --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings

  source-release:
    name: Build Source Archive
    runs-on: ubuntu-24.04
    needs: validate-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archive
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p target/source
          git archive \
            --format=tar.gz \
            --prefix="memory-${version}/" \
            --output="target/source/memory-${version}.tar.gz" \
            "$GITHUB_SHA"
          sha256sum "target/source/memory-${version}.tar.gz" > "target/source/memory-${version}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: source-release
          path: target/source/*
          if-no-files-found: error

  linux-release:
    name: Build Linux ${{ matrix.deb_arch }} Package
    runs-on: ${{ matrix.runner }}
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            deb_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            deb_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Debian package
        run: ./packaging/build-deb.sh --arch "${{ matrix.deb_arch }}" --target "${{ matrix.rust_target }}"

      - name: Generate checksum
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          deb="target/debian/memory-layer_${version}_${{ matrix.deb_arch }}.deb"
          sha256sum "$deb" > "${deb}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.deb_arch }}
          path: |
            target/debian/memory-layer_*_${{ matrix.deb_arch }}.deb
            target/debian/memory-layer_*_${{ matrix.deb_arch }}.deb.sha256
          if-no-files-found: error

  macos-release:
    name: Build macOS ${{ matrix.pkg_arch }} Package
    runs-on: ${{ matrix.runner }}
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26-intel
            pkg_arch: x86_64
            rust_target: x86_64-apple-darwin
          - runner: macos-26
            pkg_arch: aarch64
            rust_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build macOS package
        run: ./packaging/build-pkg.sh --arch "${{ matrix.pkg_arch }}" --target "${{ matrix.rust_target }}"

      - name: Generate checksum
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          pkg="target/memory-layer-${version}-macos-${{ matrix.pkg_arch }}.pkg"
          shasum -a 256 "$pkg" > "${pkg}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.pkg_arch }}
          path: |
            target/memory-layer-*-macos-${{ matrix.pkg_arch }}.pkg
            target/memory-layer-*-macos-${{ matrix.pkg_arch }}.pkg.sha256
          if-no-files-found: error

  windows-release:
    name: Build Windows x86_64 Package
    runs-on: windows-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build Windows artifacts
        shell: pwsh
        run: ./packaging/windows/build-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: target/windows/dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - source-release
      - linux-release
      - macos-release
      - windows-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: target/release-assets
          merge-multiple: true

      - name: Generate release notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          {
            echo "## Memory Layer ${GITHUB_REF_NAME}"
            echo
            echo "### Changes"
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:"- %s" "${previous_tag}..${GITHUB_REF_NAME}"
            else
              git log --pretty=format:"- %s" -20 "${GITHUB_REF_NAME}"
            fi
            echo
            echo
            echo "### Packages"
            echo "- Debian x86_64: \`memory-layer_${version}_amd64.deb\`"
            echo "- Debian arm64: \`memory-layer_${version}_arm64.deb\`"
            echo "- macOS Intel: \`memory-layer-${version}-macos-x86_64.pkg\`"
            echo "- macOS Apple Silicon: \`memory-layer-${version}-macos-aarch64.pkg\`"
            echo "- Windows x86_64 ZIP: \`memory-layer-${version}-windows-x86_64.zip\`"
            echo "- Windows x86_64 MSI: \`memory-layer-${version}-windows-x86_64.msi\`"
            echo "- Source archive for Homebrew: \`memory-${version}.tar.gz\`"
            echo
            echo "Each package has a matching \`.sha256\` checksum file."
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            target/release-assets/* \
            --target "$GITHUB_SHA" \
            --title "Memory Layer ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
