name: CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      db: ${{ steps.filter.outputs.db }}
      web: ${{ steps.filter.outputs.web }}
      docs_site: ${{ steps.filter.outputs.docs_site }}
      evals: ${{ steps.filter.outputs.evals }}
      package: ${{ steps.filter.outputs.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/**"
              - "migrations/**"
              - "memory-layer.toml.example"
            db:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/mem-api/**"
              - "crates/mem-curate/**"
              - "crates/mem-graph/**"
              - "crates/mem-search/**"
              - "crates/mem-service/**"
              - "crates/mem-test-support/**"
              - "migrations/**"
            web:
              - "web/**"
            docs_site:
              - "docs-site/**"
            evals:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/mem-cli/**"
              - "crates/mem-eval/**"
              - "crates/mem-api/**"
              - "evals/**"
            package:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/**"
              - "web/**"
              - "packaging/**"
              - ".agents/skills/**"
              - "README.md"
              - "memory-layer.toml.example"

  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.evals == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.evals == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --locked

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    needs: [changes, rust-test]
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.evals == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  db-integration:
    name: DB Integration
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.db == 'true'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memory
          POSTGRES_PASSWORD: memory
          POSTGRES_DB: memory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memory -d memory_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MEMORY_LAYER_TEST_DATABASE_URL: postgres://memory:memory@localhost:5432/memory_test
      MEMORY_LAYER_TEST_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p mem-test-support -p mem-graph -p mem-curate --locked

  offline-eval:
    name: Offline Eval Smoke
    runs-on: ubuntu-latest
    needs: [changes, rust-test]
    if: needs.changes.outputs.evals == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cp memory-layer.toml.example "$RUNNER_TEMP/memory-layer.toml"
          cargo run --locked --bin memory -- \
            --config "$RUNNER_TEMP/memory-layer.toml" \
            eval run \
            --suite evals/examples/memory-smoke \
            --condition full-memory \
            --profile offline \
            --dry-run
        env:
          MEMORY_LAYER_PROFILE: prod

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run build

  docs-site:
    name: Docs Site
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_site == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm --prefix docs-site ci
      - run: npm --prefix docs-site run build
      - run: npm --prefix docs-site run lint:links
      - run: npm --prefix docs-site run check:assets

  package-smoke:
    name: Debian Package Smoke (${{ matrix.deb_arch }})
    runs-on: ${{ matrix.runner }}
    needs: [changes, rust-test, web-build]
    if: needs.changes.outputs.package == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            deb_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            deb_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: ./packaging/build-deb.sh --arch "${{ matrix.deb_arch }}" --target "${{ matrix.rust_target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: memory-layer-deb-${{ matrix.deb_arch }}
          path: target/debian/*_${{ matrix.deb_arch }}.deb
          if-no-files-found: error
