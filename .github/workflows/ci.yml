name: CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      evals: ${{ steps.filter.outputs.evals }}
      package: ${{ steps.filter.outputs.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/**"
              - "migrations/**"
              - "memory-layer.toml.example"
            web:
              - "web/**"
            evals:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/mem-cli/**"
              - "crates/mem-eval/**"
              - "crates/mem-api/**"
              - "evals/**"
            package:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/**"
              - "web/**"
              - "packaging/**"
              - ".agents/skills/**"
              - "README.md"
              - "memory-layer.toml.example"

  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.evals == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.evals == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --locked

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    needs: [changes, rust-test]
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.evals == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  offline-eval:
    name: Offline Eval Smoke
    runs-on: ubuntu-latest
    needs: [changes, rust-test]
    if: needs.changes.outputs.evals == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cp memory-layer.toml.example "$RUNNER_TEMP/memory-layer.toml"
          cargo run --locked --bin memory -- \
            --config "$RUNNER_TEMP/memory-layer.toml" \
            eval run \
            --suite evals/examples/memory-smoke \
            --condition full-memory \
            --profile offline \
            --dry-run
        env:
          MEMORY_LAYER_PROFILE: prod

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run build

  package-smoke:
    name: Debian Package Smoke
    runs-on: ubuntu-latest
    needs: [changes, rust-test, web-build]
    if: needs.changes.outputs.package == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: ./packaging/build-deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: memory-layer-deb
          path: target/debian/*.deb
          if-no-files-found: error
